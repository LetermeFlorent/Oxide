<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oxide</title>
    <style>
      html, body { margin: 0; padding: 0; background-color: #f3f3f3; height: 100vh; width: 100vw; overflow: hidden; }
      #initial-loader { position: fixed; inset: 0; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #f3f3f3; font-family: system-ui, sans-serif; transition: opacity 0.4s ease-out; }
      .progress-container { width: 320px; height: 4px; background: #f1f5f9; border-radius: 10px; overflow: hidden; margin-top: 32px; position: relative; }
      .progress-bar { position: absolute; left: 0; top: 0; height: 100%; background: #000000; width: 0%; border-radius: 10px; transition: width 0.1s linear; }
      .percentage { margin-top: 16px; font-size: 11px; font-weight: 900; color: #94a3b8; font-variant-numeric: tabular-nums; height: 14px; line-height: 14px; }
      .title { font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5em; color: #000000; margin-right: -0.5em; line-height: 1; }
    </style>
  </head>
  <body data-tauri-drag-region style="cursor: default;">
    <div id="initial-loader" data-tauri-drag-region style="cursor: default; position: fixed; inset: 0; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #f3f3f3;">
      <div class="title" style="pointer-events: none;">Oxide</div>
      <div class="progress-container" style="pointer-events: none;"><div id="loader-bar" class="progress-bar"></div></div>
      <div id="loader-pct" class="percentage" style="pointer-events: none;">0%</div>
    </div>
    <script>
      // Native Bootstrapper: Move bar instantly
      (function() {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          loader.addEventListener('mousedown', function(e) {
            if (window.__TAURI__) {
              window.__TAURI__.window.getCurrentWindow().startDragging();
            }
          });
        }
        var progress = 0;
        var bar = document.getElementById('loader-bar');
        var pct = document.getElementById('loader-pct');
        window.bootProgress = 0;
        var int = setInterval(function() {
          if (window.bootProgress < 90) {
            window.bootProgress += (90 - window.bootProgress) * 0.05;
            if (bar) bar.style.width = window.bootProgress + '%';
            if (pct) pct.innerText = Math.round(window.bootProgress) + '%';
          }
          if (window.bootProgress >= 100) clearInterval(int);
        }, 100);

        // Ultimate Safety: Force remove loader after 5s if app hangs
        setTimeout(function() {
          if (loader && loader.style.opacity !== '0') {
            console.warn("Loader Safety: Force removing hung loader... ✨");
            loader.style.opacity = '0';
            loader.style.pointerEvents = 'none';
            setTimeout(function() { loader.remove(); }, 400);
          }
        }, 5000);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
